            padding: 0;

            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background: rgba(20, 24, 32, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #0a84ff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 20px 15px;
        }

        .tab-btn {
            background-color: var(--btn-bg);
            color: var(--text-sub);
            border: 1px solid var(--card-border);
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تصميم كارت التطبيق بدون صورة */
        .app-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .app-card:active {
            transform: scale(0.98);
        }

        .app-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            padding-left: 15px;
        }

        .app-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .app-info p {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.4;
        }

        .store-tag {
            font-size: 11px;
            color: var(--accent-color);
            font-weight: 600;
            display: inline-block;
            margin-bottom: 2px;
        }

        .download-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--btn-border);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;

            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
