<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASSANY - PRO LEAGUE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --gold: #D4AF37; 
            --gold-light: #FBE18D;
            --bg-dark: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --card-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        /* تحسين أداء الحركة لمنع "التعليق" */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; will-change: transform; }

        body { 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- الهيدر الجديد --- */
        .header { 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 2px rgba(212,175,55,0.4)); }
            to { filter: drop-shadow(0 0 10px rgba(212,175,55,0.8)); }
        }

        /* --- شريط الأخبار (تم إصلاح التعليق) --- */
        .news-ticker { 
            background: rgba(212, 175, 55, 0.08); border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            height: 40px; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        .ticker-content { 
            display: inline-block; padding-right: 100%; 
            animation: ticker-smooth 30s linear infinite; 
            color: var(--gold-light); font-weight: bold; font-size: 0.95rem;
            transform: translate3d(0, 0, 0); /* تحفيز كارت الشاشة للجوال لمنع اللق */
        }
        @keyframes ticker-smooth {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- القائمة الجانبية --- */
        .nav-overlay { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); 
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .nav-overlay.active { right: 0; }
        .nav-link { 
            font-size: 2rem; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; 
            transition: 0.3s; display: flex; align-items: center; gap: 15px;
        }
        .nav-link i { color: var(--gold); }
        .nav-link:hover { transform: scale(1.1); color: var(--gold); }

        /* --- الحاويات والكروت --- */
        .container { max-width: 500px; margin: auto; padding: 20px; min-height: 85vh; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 25px; padding: 20px; margin-bottom: 25px; 
            backdrop-filter: blur(10px); box-shadow: var(--card-shadow);
        }
        .card-header { 
            color: var(--gold); font-size: 1.2rem; font-weight: 900; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(212,175,55,0.1);
            padding-bottom: 10px;
        }

        /* --- ترتيب الدوري الملكي --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 15px 10px; background: rgba(255,255,255,0.02); text-align: center; font-weight: bold; border-radius: 10px; }
        .table-leader-row td { 
            background: linear-gradient(90deg, rgba(212,175,55,0.2), rgba(0,0,0,0.5)) !important;
            border: 1px solid var(--gold); color: var(--gold-light);
            animation: leader-pulse 2s infinite;
        }
        @keyframes leader-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(212,175,55,0.2); }
            50% { box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        }

        /* --- تصميم قسم اللاعبين الجديد (الأطوار) --- */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .player-card { 
            background: linear-gradient(145deg, #111, #1a1a1a);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 20px;
            text-align: center; position: relative; transition: 0.4s;
            overflow: hidden; cursor: pointer;
        }
        .player-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite; opacity: 0.3;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        
        .player-card-content { position: relative; z-index: 1; background: #0a0a0a; border-radius: 15px; padding: 10px; height: 100%; }
        .player-card i { font-size: 2.5rem; color: var(--gold); margin-bottom: 10px; display: block; }
        .player-card span { display: block; font-weight: 900; color: #fff; font-size: 1.1rem; }
        
        .fire-card { grid-column: span 2; background: linear-gradient(145deg, #200, #000); border-color: #ff4444; }
        .fire-card i { color: #ff4444; text-shadow: 0 0 10px #ff0000; animation: fire-pulse 1s infinite alternate; }
        @keyframes fire-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* --- الجوائز (MOTM & TOTW) --- */
        .motm-container { text-align: center; padding: 20px; }
        .motm-badge {
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--gold);
            margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }
        .totw-field {
            background: radial-gradient(circle at center, #1a331a 0%, #000 100%);
            border: 2px solid var(--gold); border-radius: 20px; height: 500px; position: relative; margin-top: 20px;
        }

        /* --- تذكرة المباريات --- */
        .match-ticket {
            background: #111; border-right: 5px solid var(--gold); padding: 15px; border-radius: 12px;
            margin-bottom: 15px; text-align: center; position: relative;
        }
        .match-ticket::after { content: ''; position: absolute; left: 10px; top: 50%; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; opacity: 0.5; }

        .modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(10px); 
        }
        .modal-box { 
            background: #111; border: 2px solid var(--gold); width: 85%; padding: 30px; 
            border-radius: 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.3);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="toggleMenu()" style="cursor:pointer; color:var(--gold); font-size:1.8rem;"><i class="fas fa-bars-staggered"></i></div>
    <div class="brand-logo">HASSANY</div>
    <div onclick="showPage('home')" style="color:var(--gold); cursor:pointer; font-size:1.6rem;"><i class="fas fa-house-chimney-crack"></i></div>
</div>

<div class="news-ticker">
    <div class="ticker-wrap">
        <div class="ticker-content" id="news-text">جارِ تحميل آخر الأخبار من الملاعب...</div>
    </div>
</div>

<div class="nav-overlay" id="navOverlay">
    <a href="#" class="nav-link" onclick="showPage('home')">الرئيسية <i class="fas fa-home-alt"></i></a>
    <a href="#" class="nav-link" onclick="showPage('matches')">المباريات <i class="fas fa-futbol"></i></a>
    <a href="#" class="nav-link" onclick="showPage('awards')">الجوائز <i class="fas fa-award"></i></a>
    <a href="#" class="nav-link" onclick="showPage('players')">اللاعبين <i class="fas fa-users"></i></a>
    <div onclick="toggleMenu()" style="margin-top:40px; color:var(--gold); font-size:2.5rem; cursor:pointer;"><i class="fas fa-circle-xmark"></i></div>
</div>

<div id="home-page" class="container">
    <div class="glass-card">
        <div class="card-header"><i class="fas fa-crown"></i> التصنيف العالمي</div>
        <div id="world-rank"></div>
    </div>
    <div class="glass-card">
        <div class="card-header"><i class="fas fa-list-ol"></i> ترتيب المحترفين</div>
        <table id="league-table"></table>
    </div>
</div>

<div id="matches-page" class="container hidden">
    <div class="glass-card">
        <div class="card-header"><i class="fas fa-ticket"></i> جدول المواجهات</div>
        <div id="next-matches"></div>
    </div>
</div>

<div id="awards-page" class="container hidden">
    <div class="glass-card"><div class="card-header"><i class="fas fa-medal"></i> البالون دور</div><div id="ballon-list"></div></div>
    <div class="glass-card"><div class="card-header"><i class="fas fa-fire-flame-curved"></i> الهدافين</div><div id="scorers-list"></div></div>
    <div id="motm-list"></div>
</div>

<div id="players-page" class="container hidden">
    <div class="player-grid" id="players-list"></div>
</div>

<div class="modal" id="pModal" onclick="this.style.display='none'">
    <div class="modal-box">
        <h2 id="mName" style="color:var(--gold); margin-bottom:15px;"></h2>
        <p id="mInfo" style="line-height:1.8; color:#ccc;"></p>
    </div>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

    function toggleMenu() { document.getElementById('navOverlay').classList.toggle('active'); }
    
    function showPage(p) {
        ['home', 'matches', 'awards', 'players'].forEach(id => {
            document.getElementById(id + '-page').classList.toggle('hidden', id !== p);
        });
        if(document.getElementById('navOverlay').classList.contains('active')) toggleMenu();
        window.scrollTo(0,0);
    }

    function openP(n, i) { 
        document.getElementById('mName').innerText = n; 
        document.getElementById('mInfo').innerText = i; 
        document.getElementById('pModal').style.display = 'flex'; 
    }

    async function updateData() {
        try {
            const r = await fetch(url);
            const t = await r.text();
            const rows = t.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));

            // الأخبار
            document.getElementById('news-text').innerText = rows[1][21] || "لا توجد أخبار حالياً";

            // التصنيف العالمي
            let wr="";
            for(let i=1; i<=5; i++) {
                if(rows[i][8]) {
                    wr += `<div class="rank-item ${i==1?'top':''}" style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:10px; border-right:3px solid ${i==1?'var(--gold)':'transparent'}">
                        <span>${i==1?'🏆':i+'.'} ${rows[i][8]}</span>
                        <b style="color:var(--gold)">${rows[i][9]}</b>
                    </div>`;
                }
            }
            document.getElementById('world-rank').innerHTML = wr;

            // الجدول
            let teams = rows.slice(1).map(r => ({ n: r[0], p: r[1], s: parseInt(r[5]) || 0 })).filter(x => x.n && x.n !== "الفريق").sort((a,b) => b.s - a.s);
            let trs="";
            teams.forEach((x, i) => { 
                trs += `<tr class="${i==0?'table-leader-row':''}">
                    <td>${i==0?'👑':i+1}</td>
                    <td style="text-align:right">${x.n}</td>
                    <td>${x.p}</td>
                    <td style="color:var(--gold)">${x.s}</td>
                </tr>`; 
            });
            document.getElementById('league-table').innerHTML = trs;

            // الجوائز
            let bl="", sl="", motm="", pl="";
            for(let i=1; i<=5; i++) if(rows[i][11]) bl += `<div class="rank-item" style="padding:10px; background:rgba(255,255,255,0.02); margin-bottom:5px; border-radius:8px;">🏅 ${rows[i][11]}</div>`;
            for(let i=1; i<=5; i++) if(rows[i][13]) sl += `<div class="rank-item" style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.02); margin-bottom:5px; border-radius:8px;"><span>⚽ ${rows[i][13]}</span><b style="color:var(--gold)">${rows[i][14]} هدف</b></div>`;
            
            if(rows[1][16]) {
                motm = `<div class="glass-card motm-container">
                    <div class="card-header"><i class="fas fa-star"></i> رجل الجولة</div>
                    <div class="motm-badge"><img src="${rows[0][15]}" style="width:100%; height:100%; object-fit:cover;"></div>
                    <h3 style="color:var(--gold)">${rows[1][16]}</h3>
                </div>`;
            }

            // تشكيلة الجولة
            let totwHtml = `<div class="glass-card"><div class="card-header"><i class="fas fa-users-rays"></i> تشكيلة الأسبوع</div><div class="totw-field">`;
            const positions = [
                {p: 'bottom:20px; left:50%', i:2, n:1}, {p: 'bottom:120px; left:20%', i:4, n:3}, 
                {p: 'bottom:120px; left:80%', i:6, n:5}, {p: 'top:50%; left:50%', i:8, n:7},
                {p: 'top:80px; left:25%', i:10, n:9}, {p: 'top:80px; left:75%', i:12, n:11}
            ];
            positions.forEach(pos => {
                if(rows[pos.n][12]) {
                    totwHtml += `<div style="position:absolute; ${pos.p}; transform:translate(-50%,-50%); text-align:center;">
                        <div style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); overflow:hidden; background:#000;">
                            <img src="${rows[pos.i][12]}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div style="font-size:10px; background:var(--gold); color:#000; padding:2px 5px; border-radius:5px; margin-top:5px; font-weight:900;">${rows[pos.n][12]}</div>
                    </div>`;
                }
            });
            totwHtml += `</div></div>`;
            
            document.getElementById('ballon-list').innerHTML = bl;
            document.getElementById('scorers-list').innerHTML = sl;
            document.getElementById('motm-list').innerHTML = motm + totwHtml;

            // قسم اللاعبين (البطاقات الجديدة)
            if(rows[1][22]) {
                pl += `<div class="player-card fire-card" onclick="openP('${rows[1][22]}', '${rows[1][23]}')">
                    <div class="player-card-content">
                        <i class="fas fa-fire"></i>
                        <span>${rows[1][22]}</span>
                        <small style="color:#ff4444">بطل المقاطعة</small>
                    </div>
                </div>`;
            }
            for(let i=1; i<=12; i++) {
                if(rows[i][24]) {
                    pl += `<div class="player-card" onclick="openP('${rows[i][24]}', '${rows[i][25]}')">
                        <div class="player-card-content">
                            <i class="fas fa-shield-halved"></i>
                            <span>${rows[i][24]}</span>
                        </div>
                    </div>`;
                }
            }
            document.getElementById('players-list').innerHTML = pl;

            // المباريات
            let mx = ""; 
            for(let i=1; i<=5; i++) {
                if(rows[i][17]) {
                    mx += `<div class="match-ticket">
                        <small style="color:var(--gold)">${rows[i][20]}</small><br>
                        <b style="font-size:1.2rem;">${rows[i][17]} VS ${rows[i][18]}</b><br>
                        <small style="color:#777">${rows[i][19]}</small>
                    </div>`;
                }
            }
            document.getElementById('next-matches').innerHTML = mx;

        } catch(e) { console.error("Error updating data:", e); }
    }

    updateData();
    setInterval(updateData, 20000);
</script>
</body>
</html>
