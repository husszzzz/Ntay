<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN 365</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --gold: #ffd700; --bg: #000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .header { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 1.3rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* تصليح شريط الأخبار */
        .news-ticker { background: rgba(212, 175, 55, 0.05); border-bottom: 1px solid var(--gold); height: 35px; display: flex; align-items: center; overflow: hidden; position: sticky; top: 60px; z-index: 999; }
        .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; color: var(--gold); font-size: 0.9rem; font-weight: bold; padding-right: 100%; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .container { max-width: 500px; margin: auto; padding: 20px; }
        
        /* Maviga Style - ستايل مافيغا */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { 
            background: linear-gradient(145deg, #121212, #080808); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 18px; padding: 20px 10px; text-align: center; 
            transition: 0.4s; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .p-card i { font-size: 1.6rem; color: var(--gold); display: block; margin-bottom: 8px; filter: drop-shadow(0 0 5px var(--gold)); }
        .p-card span { font-weight: 700; font-size: 0.9rem; display: block; }
        .fire-hero { grid-column: span 2; border-color: #ff4444; background: linear-gradient(145deg, #1a0505, #000); }
        .fire-hero i { color: #ff4444; }

        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .card-title { color: var(--gold); font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="toggleMenu()" style="color:var(--gold); font-size:1.5rem;"><i class="fas fa-bars-staggered"></i></div>
    <div class="logo-text">HUB HUSSAIN 365</div>
    <div onclick="showPage('home')" style="color:var(--gold); font-size:1.4rem;"><i class="fas fa-house"></i></div>
</div>

<div class="news-ticker"><div class="ticker-content" id="news-text">تحميل الأخبار...</div></div>

<div id="home-page" class="container">
    <div class="glass-card">
        <div class="card-title">🏆 ترتيب الفرق</div>
        <div id="league-table"></div>
    </div>
    <div class="glass-card">
        <div class="card-title">⭐ أفضل اللاعبين</div>
        <div class="player-grid" id="players-list"></div>
    </div>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

    async function updateData() {
        try {
            const r = await fetch(url); const t = await r.text();
            const rows = t.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));
            
            // 1. شريط الأخبار (يقرأ من عمود محدد أو نص ثابت)
            document.getElementById('news-text').innerText = "🔥 أهلاً بكم في HUB HUSSAIN 365 - تابعوا آخر النتائج والإحصائيات أولاً بأول 🔥";

            // 2. ترتيب الفرق (العمود A و B)
            let trs = "";
            for(let i=1; i<=6; i++) {
                if(rows[i][0]) trs += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;"><span>${rows[i][0]}</span><span style="color:var(--gold)">${rows[i][1] || 0} لعب</span></div>`;
            }
            document.getElementById('league-table').innerHTML = trs;

            // 3. اللاعبين (العمود Y يبدأ من السطر 2)
            let pl = "";
            for(let i=1; i<=11; i++) {
                let name = rows[i][24]; // عمود Y هو رقم 24
                if(name && name !== "") {
                    let isCaptain = (name.includes("حسين"));
                    pl += `<div class="p-card ${isCaptain?'fire-hero':''}">
                        <i class="fas ${isCaptain?'fa-crown':'fa-user-shield'}"></i>
                        <span>${name}</span>
                    </div>`;
                }
            }
            document.getElementById('players-list').innerHTML = pl;

        } catch(e) { console.log(e); }
    }
    
    updateData();
    setInterval(updateData, 15000);
</script>
</body>
</html>
