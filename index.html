<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSSAIN PRO | THE FUTURE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap');

        :root {
            --accent: #ffd700;
            --danger: #ff004c;
            --dark-bg: #080808;
            --card-bg: #121212;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 80px; /* لشريط التنقل السفلي */
            overflow-x: hidden;
        }

        /* --- Header الأنيق --- */
        .top-bar {
            background: linear-gradient(to bottom, #000, transparent);
            padding: 20px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .timer-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-weight: 900;
        }

        /* --- شريط الأخبار المنزلق --- */
        .news-ticker {
            background: var(--danger);
            color: white;
            padding: 8px 0;
            font-size: 0.85rem;
            font-weight: 900;
            overflow: hidden;
            white-space: nowrap;
        }
        .news-ticker div {
            display: inline-block;
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- Grid System --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 15px;
        }

        /* --- Modular Cards --- */
        .module {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .module::before {
            content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--accent);
        }
        .module-title {
            font-weight: 900; font-size: 1rem; color: #888; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .module-title i { color: var(--accent); }

        /* --- التوهج الأحمر للنقاط --- */
        .red-glow-pts {
            color: var(--accent);
            font-family: 'Orbitron';
            font-weight: 900;
            animation: glow-pulse 1.5s infinite;
        }
        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 5px var(--danger); transform: scale(1); }
            50% { text-shadow: 0 0 15px var(--danger); transform: scale(1.1); }
        }

        /* --- الجوائز (Award Cards) --- */
        .award-banner {
            background: linear-gradient(45deg, #1a1a1a, #000);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .award-icon { font-size: 2rem; color: var(--accent); }

        /* --- شريط التنقل السفلي (The Dock) --- */
        .bottom-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex; justify-content: space-around;
            padding: 12px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dock-item { color: #555; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .dock-item.active { color: var(--accent); transform: translateY(-5px); }

        /* --- جدول الترتيب --- */
        .mini-table { width: 100%; border-collapse: collapse; }
        .mini-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: bold; text-align: center; }
        .first-row { background: rgba(255, 215, 0, 0.05); }

        /* --- قسم اللاعبين المطور --- */
        .player-strip {
            display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none;
        }
        .player-chip {
            min-width: 120px; background: #1a1a1a; padding: 15px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .player-chip i { font-size: 1.5rem; color: var(--accent); display: block; margin-bottom: 8px; }

        /* --- الأقسام المخفية --- */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 0.7rem; letter-spacing: 3px; color: #555; margin-bottom: 5px;">PRO LEAGUE DASHBOARD</div>
        <div class="timer-box" id="timer">00:00:00</div>
    </div>

    <div class="news-ticker">
        <div id="ticker-text">جارِ تحميل آخر التحديثات والأخبار الحصرية...</div>
    </div>

    <main class="main-grid" id="main-content">
        <div id="home-view">
            <div class="module">
                <div class="module-title">التصنيف العالمي <i class="fas fa-globe"></i></div>
                <div id="world-rank"></div>
            </div>

            <div class="module" style="margin-top: 20px;">
                <div class="module-title">صدارة الدوري <i class="fas fa-chart-line"></i></div>
                <table class="mini-table" id="league-table"></table>
            </div>
        </div>

        <div id="matches-view" class="hidden">
            <div class="module-title">المواجهات القادمة <i class="fas fa-bolt"></i></div>
            <div id="matches-list"></div>
        </div>

        <div id="awards-view" class="hidden">
            <div class="module">
                <div class="module-title">رجل الجولة <i class="fas fa-star"></i></div>
                <div id="motm-box"></div>
            </div>
            <div class="module" style="margin-top:20px;">
                <div class="module-title">تشكيلة الجولة <i class="fas fa-users-rectangle"></i></div>
                <div id="totw-box" style="color:var(--accent); font-weight:bold; line-height:2;"></div>
            </div>
            <div class="module" style="margin-top:20px;">
                <div class="module-title">البالون دور <i class="fas fa-medal"></i></div>
                <div id="ballon-list"></div>
            </div>
        </div>

        <div id="players-view" class="hidden">
            <div class="module">
                <div class="module-title">بطل الأسبوع <i class="fas fa-fire-glow"></i></div>
                <div id="hero-player"></div>
            </div>
            <div class="module-title" style="margin-top:20px;">قائمة المحاربين</div>
            <div class="player-strip" id="player-chips"></div>
        </div>
    </main>

    <div class="bottom-dock">
        <div class="dock-item active" onclick="switchTab('home', this)"><i class="fas fa-grip-vertical"></i></div>
        <div class="dock-item" onclick="switchTab('matches', this)"><i class="fas fa-calendar-alt"></i></div>
        <div class="dock-item" onclick="switchTab('awards', this)"><i class="fas fa-trophy"></i></div>
        <div class="dock-item" onclick="switchTab('players', this)"><i class="fas fa-user-ninja"></i></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

        function switchTab(tabId, el) {
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            ['home', 'matches', 'awards', 'players'].forEach(id => {
                document.getElementById(id + '-view').classList.toggle('hidden', id !== tabId);
            });
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

                // 1. التقرير الإخباري (Col 21)
                document.getElementById('ticker-text').innerText = rows[1][21] || "لا توجد أخبار عاجلة";

                // 2. التصنيف العالمي (Col 8, 9)
                let wr = "";
                for(let i=1; i<=5; i++) { if(rows[i][8]) wr += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1a1a1a;"><span>${rows[i][8]}</span><span style="color:var(--accent)">#${i}</span></div>`; }
                document.getElementById('world-rank').innerHTML = wr;

                // 3. الجدول (Col 0, 1, 5)
                let teams = rows.slice(1).map(r => ({ n: r[0], p: r[1], s: parseInt(r[5]) || 0 }))
                                .filter(t => t.n && t.n !== "الفريق")
                                .sort((a,b) => b.s - a.s);
                let htmlTable = "";
                teams.forEach((t, i) => {
                    htmlTable += `<tr class="${i==0?'first-row':''}">
                        <td>${i+1}</td>
                        <td style="text-align:right">${t.n}</td>
                        <td>${t.p}</td>
                        <td class="red-glow-pts">${t.s}</td>
                    </tr>`;
                });
                document.getElementById('league-table').innerHTML = htmlTable;

                // 4. الجوائز (Col 11: Ballon | Col 12: Man of Match | Col 15: Team)
                document.getElementById('motm-box').innerHTML = `<div class="award-banner"><i class="fas fa-crown award-icon"></i><div><b>${rows[1][12] || 'لم يحدد'}</b><br><small>أفضل لاعب في الجولة</small></div></div>`;
                document.getElementById('totw-box').innerHTML = rows[1][15] ? rows[1][15].split('-').join(' | ') : "سيتم الإعلان عنها قريباً";
                
                let ballon = "";
                for(let i=1; i<=3; i++) { if(rows[i][11]) ballon += `<div class="award-banner" style="border:none; background:var(--glass);"><i class="fas fa-medal" style="color:#cd7f32"></i><b>${rows[i][11]}</b></div>`; }
                document.getElementById('ballon-list').innerHTML = ballon;

                // 5. اللاعبين (Col 22,23: Hero | Col 24,25: Others)
                document.getElementById('hero-player').innerHTML = `<div class="award-banner" style="border-color:var(--danger)"><i class="fas fa-fire award-icon" style="color:var(--danger)"></i><div><b>${rows[1][22]}</b><br><small>${rows[1][23]}</small></div></div>`;
                let chips = "";
                for(let i=1; i<=10; i++) { if(rows[i][24]) chips += `<div class="player-chip"><i class="fas fa-user-shield"></i><b>${rows[i][24]}</b><br><small>${rows[i][25]}</small></div>`; }
                document.getElementById('player-chips').innerHTML = chips;

                // 6. المباريات (Col 17, 18, 19, 20)
                let mx = "";
                for(let i=1; i<=5; i++) {
                    if(rows[i][17]) mx += `<div class="module" style="margin-bottom:15px;">
                        <div style="font-size:0.7rem; color:var(--accent); font-family:'Orbitron'">${rows[i][20]}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <b style="width:40%">${rows[i][17]}</b>
                            <span style="background:var(--danger); padding:2px 10px; border-radius:10px; font-size:0.8rem;">VS</span>
                            <b style="width:40%; text-align:left">${rows[i][18]}</b>
                        </div>
                    </div>`;
                }
                document.getElementById('matches-list').innerHTML = mx;

            } catch(e) { console.error("Data Load Error"); }
        }

        // المؤقت
        setInterval(() => {
            const target = new Date("Apr 14, 2026 16:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const el = document.getElementById("timer");
            if (diff < 0) { el.innerText = "LIVE"; el.style.color = var(--danger); }
            else {
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                el.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
        }, 1000);

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
