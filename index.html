<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN 365 | PRO EDITION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap');

        :root {
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --red-neon: #ff003c;
            --red-glow: rgba(255, 0, 60, 0.6);
            --bg-deep: #020202;
            --glass-strong: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        /* --- Animations الأسطورية --- */
        @keyframes pulse-red {
            0% { text-shadow: 0 0 5px var(--red-neon); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--red-neon), 0 0 30px var(--red-neon); transform: scale(1.1); }
            100% { text-shadow: 0 0 5px var(--red-neon); transform: scale(1); }
        }

        @keyframes bg-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- الإعدادات العامة --- */
        body {
            background: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #1a0505 0%, #020202 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container { max-width: 500px; margin: auto; padding: 20px; animation: slide-in 0.8s ease-out; }
        .hidden { display: none !important; }

        /* --- Header & Navigation --- */
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-box { text-align: center; }
        .logo-box span { font-family: 'Orbitron', sans-serif; color: var(--red-neon); font-size: 0.7rem; letter-spacing: 3px; display: block; }
        #countdown { font-family: 'Orbitron', sans-serif; color: var(--gold); font-weight: 900; font-size: 1.2rem; }

        .nav-trigger { font-size: 1.8rem; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .nav-trigger:hover { transform: rotate(90deg); color: var(--red-neon); }

        /* --- القائمة الجانبية الأسطورية --- */
        .nav-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px);
            z-index: 2000;
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .nav-overlay.active { right: 0; }
        .nav-link {
            font-size: 2.2rem; font-weight: 900; color: #fff; text-decoration: none;
            margin: 15px; transition: 0.4s; position: relative;
        }
        .nav-link:hover { color: var(--gold); transform: scale(1.1); }
        .nav-link i { color: var(--red-neon); margin-left: 15px; font-size: 1.5rem; }

        /* --- جداول الدوري والنقاط --- */
        .glass-card {
            background: var(--glass-strong);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .card-header {
            font-size: 1.3rem; font-weight: 900; color: var(--gold);
            margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
            border-right: 4px solid var(--red-neon); padding-right: 15px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: rgba(255,255,255,0.02); transition: 0.3s; }
        tr:hover { background: rgba(255,255,255,0.05); }
        td { padding: 15px 10px; text-align: center; border-radius: 10px; font-weight: 700; }

        .points-cell { 
            color: var(--gold); 
            font-size: 1.2rem; 
            font-family: 'Orbitron', sans-serif;
            animation: pulse-red 2s infinite;
        }

        /* --- قسم اللاعبين (Legend Cards) --- */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .player-card {
            background: linear-gradient(135deg, rgba(20,20,20,1) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }
        .player-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--gold), transparent);
            animation: rotate 4s linear infinite; opacity: 0.2;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .player-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 0 20px var(--gold-glow); }
        .player-card i { font-size: 2.5rem; margin-bottom: 10px; display: block; color: var(--red-neon); }

        /* --- ترتيب المباريات (Big Match) --- */
        .match-ticket {
            background: #0a0a0a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 6px solid var(--red-neon);
            position: relative;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .match-info { display: flex; justify-content: space-between; align-items: center; }
        .team-name { font-size: 1.1rem; font-weight: 900; width: 40%; }
        .vs-badge { 
            background: var(--red-neon); padding: 5px 12px; border-radius: 5px; 
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
        }

        /* --- شريط الأخبار الملكي --- */
        .news-bar {
            background: var(--red-neon); color: #fff; height: 35px;
            display: flex; align-items: center; overflow: hidden;
            font-weight: 900; font-size: 0.9rem;
        }
        .news-slide { display: inline-block; white-space: nowrap; animation: news-scroll 25s linear infinite; }
        @keyframes news-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    </style>
</head>
<body>

    <div class="header">
        <div class="nav-trigger" onclick="toggleNav()"><i class="fas fa-ghost"></i></div>
        <div class="logo-box">
            <span>HUSSAIN HASSANY</span>
            <div id="countdown">LOADING...</div>
        </div>
        <div onclick="showPage('home')" style="color:var(--gold); font-size:1.5rem; cursor:pointer;"><i class="fas fa-bolt"></i></div>
    </div>

    <div class="news-bar">
        <div class="news-slide" id="news-content">يرجى الانتظار.. يتم جلب آخر أخبار الدوري الذهبي الآن..</div>
    </div>

    <nav class="nav-overlay" id="mainNav">
        <a href="#" class="nav-link" onclick="showPage('home')">الرئيسية <i class="fas fa-home"></i></a>
        <a href="#" class="nav-link" onclick="showPage('matches')">المباريات <i class="fas fa-fire"></i></a>
        <a href="#" class="nav-link" onclick="showPage('awards')">الجوائز <i class="fas fa-crown"></i></a>
        <a href="#" class="nav-link" onclick="showPage('players')">الأبطال <i class="fas fa-user-ninja"></i></a>
        <div onclick="toggleNav()" style="margin-top:40px; color:var(--red-neon); font-size:3rem; cursor:pointer;"><i class="fas fa-times-circle"></i></div>
    </nav>

    <main class="container">
        <section id="home-page">
            <div class="glass-card">
                <div class="card-header"><i class="fas fa-trophy"></i> صدارة الترتيب</div>
                <table id="league-table"></table>
            </div>
        </section>

        <section id="matches-page" class="hidden">
            <div class="card-header"><i class="fas fa-calendar-check"></i> مواجهات لا تقبل القسمة</div>
            <div id="matches-list"></div>
        </section>

        <section id="players-page" class="hidden">
            <div class="player-grid" id="players-list"></div>
        </section>
        
        <section id="awards-page" class="hidden">
            <div class="glass-card" id="awards-content"></div>
        </section>
    </main>

    <script>
        const API_URL = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

        function toggleNav() { document.getElementById('mainNav').classList.toggle('active'); }

        function showPage(p) {
            ['home', 'matches', 'awards', 'players'].forEach(id => {
                document.getElementById(id + '-page').classList.toggle('hidden', id !== p);
            });
            if(document.getElementById('mainNav').classList.contains('active')) toggleNav();
            window.scrollTo(0,0);
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.text();
                const rows = data.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

                // 1. الترتيب مع توهج النقاط
                let tableHtml = "";
                let teams = rows.slice(1).map(r => ({ name: r[0], pts: parseInt(r[5]) || 0 }))
                                .filter(t => t.name && t.name !== "الفريق")
                                .sort((a,b) => b.pts - a.pts);
                
                teams.forEach((t, i) => {
                    tableHtml += `<tr>
                        <td style="color:${i==0?'var(--gold)':'#fff'}">${i==0?'<i class="fas fa-crown"></i>':i+1}</td>
                        <td style="text-align:right">${t.name}</td>
                        <td class="points-val points-cell">${t.pts}</td>
                    </tr>`;
                });
                document.getElementById('league-table').innerHTML = tableHtml;

                // 2. المباريات بستايل "Big Match"
                let matchHtml = "";
                for(let i=1; i<=5; i++) {
                    if(rows[i][17]) {
                        matchHtml += `
                        <div class="match-ticket">
                            <div style="color:var(--gold); font-size:0.7rem; margin-bottom:10px; font-family:'Orbitron'">${rows[i][20]}</div>
                            <div class="match-info">
                                <div class="team-name">${rows[i][17]}</div>
                                <div class="vs-badge">VS</div>
                                <div class="team-name" style="text-align:left">${rows[i][18]}</div>
                            </div>
                        </div>`;
                    }
                }
                document.getElementById('matches-list').innerHTML = matchHtml;

                // 3. اللاعبين (Legend Cards)
                let playersHtml = "";
                for(let i=1; i<=10; i++) {
                    if(rows[i][24]) {
                        playersHtml += `
                        <div class="player-card">
                            <i class="fas fa-shield-halved"></i>
                            <div style="font-weight:900; font-size:1.1rem; color:var(--gold)">${rows[i][24]}</div>
                            <div style="font-size:0.8rem; color:#888;">محارب الدوري</div>
                        </div>`;
                    }
                }
                document.getElementById('players-list').innerHTML = playersHtml;

                // الأخبار
                document.getElementById('news-content').innerText = rows[1][21] || "لا يوجد أخبار حالية..";

            } catch (e) { console.error("Error fetching data"); }
        }

        // المؤقت
        setInterval(() => {
            const target = new Date("Apr 14, 2026 16:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const el = document.getElementById("countdown");
            if (diff < 0) { el.innerText = "IN PROGRESS"; el.style.color = "var(--red-neon)"; }
            else {
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                el.innerText = `${h}:${m}:${s}`;
            }
        }, 1000);

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
