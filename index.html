<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Buttons 📱</title>
    <style>
        :root {
            --bg: #f4f4f9;
            --card: #ffffff;
            --text: #333;
            --accent: #007aff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1e;
                --card: #2c2c2e;
                --text: #ffffff;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin: 0; }
        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .smart-card {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }
        .info h3 { margin: 0; font-size: 18px; }
        .info span { font-size: 12px; opacity: 0.6; }
        .actions button {
            background: none;
            border: none;
            font-size: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>Smart Buttons 🌙</h1>
    <button class="add-btn" onclick="openModal()">+</button>
</header>

<div class="container" id="buttonsList">
    </div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>إضافة زر جديد ✨</h3>
        <input type="text" id="btnName" placeholder="اسم الزر">
        <input type="text" id="btnValue" placeholder="الرابط أو النص">
        <select id="btnType">
            <option value="url">رابط (URL) 🔗</option>
            <option value="text">نص (Text) 📝</option>
        </select>
        <button class="save-btn" onclick="saveButton()">حفظ الزر</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:red;">إلغاء</button>
    </div>
</div>

<script>
    let buttons = JSON.parse(localStorage.getItem('smart_buttons_h') || '[]');

    function renderButtons() {
        const list = document.getElementById('buttonsList');
        list.innerHTML = '';
        buttons.forEach((btn, index) => {
            list.innerHTML += `
                <div class="smart-card" onclick="actionButton(${index})">
                    <div class="info">
                        <h3>${btn.name}</h3>
                        <span>${btn.type === 'url' ? 'رابط 🔗' : 'نص 📝'}</span>
                    </div>
                    <div class="actions">
                        <button onclick="deleteButton(event, ${index})">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveButton() {
        const name = document.getElementById('btnName').value;
        const val = document.getElementById('btnValue').value;
        const type = document.getElementById('btnType').value;

        if(!name || !val) return alert('املأ الحقول يا حسين!');

        buttons.unshift({name, val, type});
        localStorage.setItem('smart_buttons_h', JSON.stringify(buttons));
        renderButtons();
        closeModal();
        
        // مسح الحقول
        document.getElementById('btnName').value = '';
        document.getElementById('btnValue').value = '';
    }

    function actionButton(index) {
        const btn = buttons[index];
        if(btn.type === 'url') {
            window.open(btn.val, '_blank');
        } else {
            alert(btn.name + ":\n" + btn.val);
        }
    }

    function deleteButton(e, index) {
        e.stopPropagation();
        if(confirm('متأكد تريد الحذف؟')) {
            buttons.splice(index, 1);
            localStorage.setItem('smart_buttons_h', JSON.stringify(buttons));
            renderButtons();
        }
    }

    renderButtons();
</script>
</body>
</html>
