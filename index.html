<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN 365 | PRO LEAGUE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap');

        :root {
            --gold: #ffd700;
            --red-neon: #ff003c;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* --- Animations --- */
        @keyframes red-pulse {
            0% { text-shadow: 0 0 5px var(--red-neon); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--red-neon); transform: scale(1.05); }
            100% { text-shadow: 0 0 5px var(--red-neon); transform: scale(1); }
        }

        @keyframes leader-glow {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); border-color: var(--gold); }
            100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        }

        /* --- General Style --- */
        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a0505 0%, #020202 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .container { max-width: 500px; margin: auto; padding: 20px; min-height: 85vh; }
        .hidden { display: none !important; }

        /* --- Header --- */
        .header {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { text-align: center; }
        .logo-area span { display: block; font-size: 0.6rem; color: var(--red-neon); font-weight: 900; letter-spacing: 2px; }
        #countdown { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1.2rem; font-weight: 900; }

        /* --- News Ticker --- */
        .ticker-wrap {
            background: rgba(255, 0, 60, 0.1);
            border-bottom: 1px solid var(--red-neon);
            height: 35px; display: flex; align-items: center; overflow: hidden;
        }
        .ticker-move { display: inline-block; white-space: nowrap; animation: move 20s linear infinite; color: #fff; font-weight: bold; font-size: 0.85rem; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- Navigation --- */
        .nav-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.5s; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .nav-overlay.active { right: 0; }
        .nav-item { font-size: 2rem; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; transition: 0.3s; }
        .nav-item:hover { color: var(--gold); transform: scale(1.1); }

        /* --- Cards & Tables --- */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 20px; margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .card-title { color: var(--gold); font-weight: 900; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 12px; background: rgba(255,255,255,0.02); text-align: center; font-weight: bold; border-radius: 10px; }
        
        .pts-neon { color: var(--gold); animation: red-pulse 2s infinite; font-family: 'Orbitron'; }
        .leader-row { animation: leader-glow 2s infinite; background: linear-gradient(90deg, #1a1400, #000) !important; }

        /* --- World Rank Items --- */
        .rank-box { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border-right: 3px solid var(--red-neon); }

        /* --- NEW Player Section Style --- */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .player-tag {
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; text-align: center;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .player-tag::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--gold); opacity: 0.3; }
        .player-tag:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .player-tag i { font-size: 1.8rem; color: var(--gold); display: block; margin-bottom: 8px; }
        
        .hero-tag {
            grid-column: span 2; background: linear-gradient(90deg, #440000, #000);
            border: 2px solid var(--red-neon); box-shadow: 0 0 15px rgba(255,0,60,0.3);
        }
        .hero-tag i { color: var(--red-neon); animation: red-pulse 1.5s infinite; }

        /* --- Matches Style --- */
        .match-card {
            background: #0a0a0a; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            border-left: 5px solid var(--gold); position: relative;
        }
        .match-time { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--gold); }
        .teams-flex { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-weight: 900; }

    </style>
</head>
<body>

    <div class="header">
        <div onclick="toggleMenu()" style="cursor:pointer; color:var(--gold); font-size:1.6rem;"><i class="fas fa-bars-staggered"></i></div>
        <div class="logo-area">
            <span>DEVELOPER HUSSAIN</span>
            <div id="countdown">00:00:00</div>
        </div>
        <div onclick="showPage('home')" style="color:var(--gold); cursor:pointer; font-size:1.5rem;"><i class="fas fa-house-chimney-window"></i></div>
    </div>

    <div class="ticker-wrap"><div class="ticker-move" id="news-text">جاري جلب آخر أخبار الدوري الذهبي...</div></div>

    <nav class="nav-overlay" id="mainNav">
        <a href="#" class="nav-item" onclick="showPage('home')">الرئيسية <i class="fas fa-home"></i></a>
        <a href="#" class="nav-item" onclick="showPage('matches')">المباريات <i class="fas fa-futbol"></i></a>
        <a href="#" class="nav-item" onclick="showPage('awards')">الجوائز <i class="fas fa-award"></i></a>
        <a href="#" class="nav-item" onclick="showPage('players')">الأبطال <i class="fas fa-user-shield"></i></a>
        <div onclick="toggleMenu()" style="margin-top:40px; color:var(--red-neon); font-size:3rem; cursor:pointer;"><i class="fas fa-circle-xmark"></i></div>
    </nav>

    <div id="home-page" class="container">
        <div class="glass-card">
            <div class="card-title"><i class="fas fa-earth-americas"></i> التصنيف العالمي</div>
            <div id="world-rank-list"></div>
        </div>
        <div class="glass-card">
            <div class="card-title"><i class="fas fa-ranking-star"></i> ترتيب الدوري</div>
            <table id="league-table"></table>
        </div>
    </div>

    <div id="matches-page" class="container hidden">
        <div class="card-title" style="padding:10px;"><i class="fas fa-clock-rotate-left"></i> جدول المواجهات</div>
        <div id="matches-list"></div>
    </div>

    <div id="awards-page" class="container hidden">
        <div class="glass-card">
            <div class="card-title"><i class="fas fa-trophy"></i> مرشحي البالون دور</div>
            <div id="ballon-dor"></div>
        </div>
        <div class="glass-card">
            <div class="card-title"><i class="fas fa-fire-flame-curved"></i> قائمة الهدافين</div>
            <div id="top-scorers"></div>
        </div>
        <div id="special-awards"></div>
    </div>

    <div id="players-page" class="container hidden">
        <div class="player-grid" id="players-list"></div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

        function toggleMenu() { document.getElementById('mainNav').classList.toggle('active'); }
        
        function showPage(p) {
            ['home', 'matches', 'awards', 'players'].forEach(id => document.getElementById(id + '-page').classList.toggle('hidden', id !== p));
            if(document.getElementById('mainNav').classList.contains('active')) toggleMenu();
            window.scrollTo(0,0);
        }

        async function updateDashboard() {
            try {
                const res = await fetch(SHEET_URL);
                const data = await res.text();
                const rows = data.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

                // 1. الأخبار (Column 21)
                document.getElementById('news-text').innerText = rows[1][21] || "لا توجد أخبار جديدة حالياً";

                // 2. التصنيف العالمي (Columns 8, 9)
                let wr = "";
                for(let i=1; i<=5; i++) {
                    if(rows[i][8]) wr += `<div class="rank-box"><span>${i}. ${rows[i][8]}</span><b style="color:var(--gold)">${rows[i][9]}</b></div>`;
                }
                document.getElementById('world-rank-list').innerHTML = wr;

                // 3. ترتيب الدوري (Columns 0, 1, 5)
                let teams = rows.slice(1).map(r => ({ n: r[0], p: r[1], s: parseInt(r[5]) || 0 }))
                                .filter(x => x.n && x.n !== "الفريق")
                                .sort((a,b) => b.s - a.s);
                let trs = "";
                teams.forEach((x, i) => {
                    trs += `<tr class="${i==0?'leader-row':''}">
                        <td>${i==0?'<i class="fas fa-crown"></i>':i+1}</td>
                        <td style="text-align:right">${x.n}</td>
                        <td>${x.p}</td>
                        <td class="pts-neon">${x.s}</td>
                    </tr>`;
                });
                document.getElementById('league-table').innerHTML = trs;

                // 4. الجوائز (Ballon d'Or Col 11 | Scorers Col 13, 14)
                let bl = "", sl = "";
                for(let i=1; i<=5; i++) { if(rows[i][11]) bl += `<div class="rank-box"><span><i class="fas fa-medal" style="color:var(--gold)"></i> ${rows[i][11]}</span></div>`; }
                for(let i=1; i<=5; i++) { if(rows[i][13]) sl += `<div class="rank-box"><span>${rows[i][13]}</span><b style="background:var(--red-neon); padding:2px 8px; border-radius:5px;">${rows[i][14]} هدف</b></div>`; }
                document.getElementById('ballon-dor').innerHTML = bl;
                document.getElementById('top-scorers').innerHTML = sl;

                // 5. قسم اللاعبين (Fire Hero Col 22, 23 | Regular Col 24, 25)
                let pl = "";
                if(rows[1][22]) pl += `<div class="player-tag hero-tag">
                    <i class="fas fa-fire"></i>
                    <div style="font-weight:900; font-size:1.2rem; color:var(--red-neon)">${rows[1][22]}</div>
                    <div style="font-size:0.8rem; color:#ccc;">${rows[1][23]}</div>
                </div>`;
                for(let i=1; i<=12; i++) {
                    if(rows[i][24]) pl += `<div class="player-tag">
                        <i class="fas fa-user-shield"></i>
                        <div style="font-weight:900; color:var(--gold)">${rows[i][24]}</div>
                        <div style="font-size:0.7rem; color:#888;">${rows[i][25]}</div>
                    </div>`;
                }
                document.getElementById('players-list').innerHTML = pl;

                // 6. المباريات (Cols 17, 18, 19, 20)
                let mx = "";
                for(let i=1; i<=5; i++) {
                    if(rows[i][17]) mx += `<div class="match-card">
                        <div class="match-time">${rows[i][20]} | ${rows[i][19]}</div>
                        <div class="teams-flex">
                            <span>${rows[i][17]}</span>
                            <span style="color:var(--red-neon); font-family:'Orbitron'">VS</span>
                            <span>${rows[i][18]}</span>
                        </div>
                    </div>`;
                }
                document.getElementById('matches-list').innerHTML = mx;

            } catch(e) { console.log("Data error"); }
        }

        // Countdown Timer
        setInterval(() => {
            const target = new Date("Apr 14, 2026 16:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const el = document.getElementById("countdown");
            if (diff < 0) { el.innerText = "LIVE NOW"; el.style.color = "var(--red-neon)"; }
            else {
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                el.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
        }, 1000);

        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
