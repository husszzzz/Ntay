<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN 365</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --gold: #ffd700; --bg: #000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .news-ticker { background: rgba(212, 175, 55, 0.05); border-bottom: 1px solid var(--gold); height: 30px; display: flex; align-items: center; overflow: hidden; position: sticky; top: 70px; z-index: 999; backdrop-filter: blur(5px); }
        .ticker-content { display: inline-block; animation: ticker 30s linear infinite; color: var(--gold); font-size: 0.8rem; font-weight: bold; white-space: nowrap; padding-right: 100%; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .header { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 1.3rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .nav-overlay.active { right: 0; }
        .nav-link { font-size: 1.8rem; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 25px; }
        .card-title { color: var(--gold); font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 14px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; align-items: center; }
        .rank-item.top { border-right: 3px solid var(--gold); background: linear-gradient(90deg, rgba(212,175,55,0.1), transparent); }
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; }
        .fire-hero { grid-column: span 2; border: 2px solid #ff4444; background: rgba(255,0,0,0.08); }
        .ticket { background: #111; padding: 18px; border-radius: 15px; border-left: 4px solid var(--gold); text-align: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
        
        /* قائمة تسجيل الدخول */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 3000; display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .login-overlay.active { visibility: visible; opacity: 1; }
        .login-box { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 30px; padding: 35px 25px; width: 85%; max-width: 350px; text-align: center; }
        .login-box input { width: 90%; padding: 12px; margin: 12px 0; background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: 30px; color: #fff; font-family: 'Cairo', sans-serif; }
        .login-box button { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; margin-top: 15px; cursor: pointer; width: 95%; font-family: 'Cairo', sans-serif; }
        .login-box .close-login { color: var(--gold); margin-top: 15px; display: block; cursor: pointer; font-size: 0.9rem; }
        .user-icon { cursor: pointer; font-size: 1.4rem; color: var(--gold); }
        .user-name { font-size: 0.8rem; margin-right: 5px; color: var(--gold); }
    </style>
</head>
<body>
<div class="header">
    <div onclick="toggleMenu()" style="cursor:pointer; color:var(--gold); font-size:1.5rem;"><i class="fas fa-bars-staggered"></i></div>
    <div class="logo-text">HUB HUSSAIN 365</div>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div onclick="showPage('home')" style="color:var(--gold); cursor:pointer; font-size:1.4rem;"><i class="fas fa-house"></i></div>
        <div onclick="openLogin()" class="user-icon"><i class="fas fa-user-circle"></i><span id="userNameDisplay" class="user-name"></span></div>
    </div>
</div>
<div class="news-ticker"><div class="ticker-content" id="news-text">جاري التحميل...</div></div>
<div class="nav-overlay" id="navOverlay">
    <a href="#" class="nav-link" onclick="showPage('home')">الرئيسية</a>
    <a href="#" class="nav-link" onclick="showPage('matches')">المباريات</a>
    <a href="#" class="nav-link" onclick="showPage('awards')">الجوائز</a>
    <a href="#" class="nav-link" onclick="showPage('players')">اللاعبين</a>
    <div onclick="toggleMenu()" style="margin-top:40px; color:var(--gold); font-size:2rem;"><i class="fas fa-times-circle"></i></div>
</div>

<!-- قائمة تسجيل الدخول -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-user-astronaut" style="font-size: 3rem; color: var(--gold); margin-bottom: 15px;"></i>
        <h3 style="margin-bottom: 20px;">تسجيل الدخول</h3>
        <input type="text" id="loginUsername" placeholder="اسم المستخدم">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div class="close-login" onclick="closeLogin()"><i class="fas fa-times"></i> إغلاق</div>
    </div>
</div>

<div id="home-page" class="container">
    <div class="glass-card"><div class="card-title">🏆 التصنيف العالمي</div><div id="world-rank"></div></div>
    <div class="glass-card"><div class="card-title">📊 ترتيب الدوري</div><table id="league-table"></table></div>
</div>
<div id="matches-page" class="container hidden">
    <div class="glass-card"><div class="card-title">⚽ المباريات القادمة</div><div id="next-matches"></div></div>
</div>
<div id="awards-page" class="container hidden">
    <div class="glass-card"><div class="card-title">👑 البالون دور</div><div id="ballon-list"></div></div>
    <div class="glass-card"><div class="card-title">🔥 الهدافين</div><div id="scorers-list"></div></div>
</div>
<div id="players-page" class="container hidden">
    <div class="glass-card"><div class="card-title">⭐ قائمة اللاعبين</div>
        <div class="player-grid" id="players-list"></div>
    </div>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";
    
    function toggleMenu() { document.getElementById('navOverlay').classList.toggle('active'); }
    function showPage(p) { 
        ['home', 'matches', 'awards', 'players'].forEach(id => document.getElementById(id + '-page').classList.toggle('hidden', id !== p)); 
        if(document.getElementById('navOverlay').classList.contains('active')) toggleMenu();
    }
    
    // دوال تسجيل الدخول
    function openLogin() { document.getElementById('loginOverlay').classList.add('active'); }
    function closeLogin() { document.getElementById('loginOverlay').classList.remove('active'); }
    function doLogin() {
        let username = document.getElementById('loginUsername').value.trim();
        if(username === "") { alert("الرجاء إدخال اسم المستخدم"); return; }
        localStorage.setItem("loggedUser", username);
        document.getElementById('userNameDisplay').innerText = username;
        closeLogin();
    }
    function checkLoginStatus() {
        let user = localStorage.getItem("loggedUser");
        if(user) document.getElementById('userNameDisplay').innerText = user;
    }
    
    async function updateData() {
        try {
            const r = await fetch(url); 
            const t = await r.text();
            const rows = t.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));
            document.getElementById('news-text').innerText = rows[1]?.[21] || "أهلاً بك في HUB HUSSAIN 365";
            
            let wr="", trs="", bl="", sl="", pl="", mx="";
            // التصنيف العالمي
            for(let i=1; i<=5; i++) if(rows[i]?.[8]) wr += `<div class="rank-item ${i==1?'top':''}"><span>${i==1?'👑 ':i+'. '} ${rows[i][8]}</span><b>${rows[i][9]}</b></div>`;
            document.getElementById('world-rank').innerHTML = wr || "<div>لا توجد بيانات</div>";
            
            // ترتيب الدوري
            let teams = rows.slice(1).filter(r => r[0] && r[0] !== "الفريق").map(r => ({ n: r[0], p: r[1], s: parseInt(r[5]) || 0 })).sort((a,b) => b.s - a.s);
            teams.forEach((x, i) => { trs += `<tr><td>${i+1}</td><td style="text-align:right">${x.n}</td><td>${x.p}</td><td style="color:var(--gold)">${x.s}</td></tr>`; });
            document.getElementById('league-table').innerHTML = trs || "<tr><td colspan='4'>لا توجد بيانات</td></tr>";
            
            // البالون دور
            for(let i=1; i<=3; i++) if(rows[i]?.[11]) bl += `<div class="rank-item"><span>🏅 ${rows[i][11]}</span></div>`;
            document.getElementById('ballon-list').innerHTML = bl || "<div>لا توجد بيانات</div>";
            
            // الهدافين
            for(let i=1; i<=5; i++) if(rows[i]?.[13]) sl += `<div class="rank-item"><span>${rows[i][13]}</span><b>${rows[i][14]} هدف</b></div>`;
            document.getElementById('scorers-list').innerHTML = sl || "<div>لا توجد بيانات</div>";
            
            // بطاقات اللاعبين - مرتبة وجميلة بنفس التصميم الأصلي
            // اللاعب المميز (Fire Hero)
            if(rows[1]?.[22]) pl += `<div class="p-card fire-hero"><i class="fas fa-fire" style="color:#ff4444"></i> <b>${rows[1][22]}</b><br><small>النجم المميز</small></div>`;
            // باقي اللاعبين
            for(let i=1; i<=10; i++) if(rows[i]?.[24]) pl += `<div class="p-card"><i class="fas fa-user"></i> ${rows[i][24]}</div>`;
            document.getElementById('players-list').innerHTML = pl || "<div class='p-card' style='grid-column:span 2'>لا توجد بيانات</div>";
            
            // المباريات
            for(let i=1; i<=2; i++) if(rows[i]?.[17]) mx += `<div class="ticket"><b>${rows[i][17]} VS ${rows[i][18]}</b><br><small>${rows[i][19] || "الملعب غير محدد"}</small></div>`;
            document.getElementById('next-matches').innerHTML = mx || "<div class='ticket'>لا توجد مباريات قادمة</div>";
            
        } catch(e) { console.error(e); }
    }
    
    checkLoginStatus();
    updateData(); 
    setInterval(updateData, 20000);
</script>
</body>
</html>
