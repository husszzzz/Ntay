<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الحسني - </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-red: #ff3c00;
            --dark-red: #8b0000;
            --bg-black: #050505;
            --card-bg: #120101;
            --card-border: #3d0000;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* خلفية النار المتحركة */
        .fire-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #3d0000 0%, transparent 70%);
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid var(--fire-red);
            background: linear-gradient(to bottom, #1a0000, var(--bg-black));
            box-shadow: 0 5px 20px rgba(255, 60, 0, 0.3);
        }

        header h1 {
            font-size: 35px;
            font-weight: 900;
            text-shadow: 0 0 15px var(--fire-red);
            margin: 0;
            color: #fff;
        }

        .dev-info {
            margin-top: 10px;
            color: var(--fire-red);
            font-weight: bold;
            font-size: 18px;
        }

        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 15px;
        }

        /* تصميم الكارت بستايل iOSGods الناري */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,60,0,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .app-card:hover {
            border-color: var(--fire-red);
            box-shadow: 0 0 20px rgba(255, 60, 0, 0.2);
            transform: translateY(-3px);
        }

        .info {
            flex: 1;
        }

        .info h3 {
            margin: 0;
            font-size: 20px;
            color: #fff;
        }

        .info p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #b0b0b0;
        }

        .tag {
            color: var(--fire-red);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* زر التحميل الناري */
        .btn-install {
            background: linear-gradient(45deg, var(--dark-red), var(--fire-red));
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 60, 0, 0.4);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-install:hover {
            box-shadow: 0 0 25px var(--fire-red);
            transform: scale(1.05);
        }

        /* الروابط المهمة */
        .links-section {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .link-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 12px 20px;
            border-radius: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .link-box:hover {
            background: var(--fire-red);
            border-color: var(--fire-red);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 13px;
            color: #666;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="fire-bg"></div>

    <header>
        <h1>متجر الحسني IPA</h1>
        <div class="dev-info">المطور: @OM_G9</div>
    </header>

    <div class="container">
        
        <div class="links-section">
            <a href="https://t.me/hassanyIPA" class="link-box">قناتنا تليجرام</a>
            <a href="https://t.me/OM_G9" class="link-box">تواصل مع المطور</a>
        </div>

        <!-- الألعاب والتطبيقات يتم توليدها هنا -->
        <div id="app-list"></div>

    </div>

    <footer>
        جميع الحقوق محفوظة للمطور الحسني © 2026
    </footer>

    <script>
        const apps = [
            ["Minecraft", "نسخة معدلة مع جميع الإضافات المفتوحة"],
            ["PUBG Mobile", "ثبات سلاح وتحسين أداء احترافي"],
            ["Spotify Premium", "استماع بدون إعلانات وتخطي لا محدود"],
            ["Instagram Plus", "تحميل الصور والقصص بضغطة واحدة"],
            ["YouTube ReVanced", "تشغيل في الخلفية وبدون إعلانات"],
            ["WhatsApp Gold", "ميزات خصوصية متقدمة وإخفاء الظهور"],
            ["Subway Surfers", "قروش ومفاتيح لا نهائية"],
            ["CapCut Pro", "تصدير بدون علامة مائية ومؤثرات مفتوحة"],
            ["PicsArt Gold", "فتح جميع أدوات التصميم المدفوعة"],
            ["Among Us Mod", "فتح جميع السكنات والحيوانات الأليفة"]
        ];

        const listContainer = document.getElementById('app-list');

        apps.forEach(app => {
            listContainer.innerHTML += `
                <div class="app-card">
                    <div class="info">
                        <span class="tag">HASSANY MOD</span>
                        <h3>${app[0]}</h3>
                        <p>${app[1]}</p>
                    </div>
                    <a href="https://app.iosgods.com/" class="btn-install" target="_blank">تثبيت IPA</a>
                </div>
            `;
        });
    </script>
</body>
</html>
